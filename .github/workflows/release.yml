name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create release ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl, mbstring, hash, openssl
          coverage: none
          tools: composer:v2

      - name: Add Magento repository
        run: |
          composer config repositories.magento composer https://repo.magento.com/
          composer config http-basic.repo.magento.com \
            "${{ secrets.MAGENTO_MARKETPLACE_PUBLIC_KEY }}" \
            "${{ secrets.MAGENTO_MARKETPLACE_PRIVATE_KEY }}"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-8.2-${{ hashFiles('composer.json') }}
          restore-keys: composer-8.2-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag
